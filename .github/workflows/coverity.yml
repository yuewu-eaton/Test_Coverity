name: Coverity Scan

on:
  pull_request:

jobs:
  coverity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download and extract Coverity Analysis Tool
        run: |
          curl -L "https://scan.coverity.com/download/linux64" --output coverity_tool.tgz
          tar xzf coverity_tool.tgz

      - name: Build project with Coverity
        run: |
          ./cov-analysis*/bin/cov-build --dir cov-int make
        # 【注意】[你的构建命令]需替换为适合你项目的构建命令，如 make、cmake --build .、mvn package 等

      - name: Submit results to Coverity Scan
        env:
          COVERITY_TOKEN: ${{ secrets.COVERITY_TOKEN }}
        run: |
          tar czvf analysis.tgz cov-int
          curl --form token=$COVERITY_TOKEN \
               --form email= yuewu@eaton.com \
               --form file=@analysis.tgz \
               --form version="GitHub Action PR ${{ github.sha }}" \
               --form description="PR自动扫描" \
               https://scan.coverity.com/builds?project= yuewu-eaton/Test_Coverity
