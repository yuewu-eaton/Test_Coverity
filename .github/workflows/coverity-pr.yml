name: Coverity Scan (Windows Local)

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  coverity:
    name: Coverity on Windows Self-hosted
    runs-on: [self-hosted, windows]

    env:
      # Coverity 登录信息（来自 GitHub Secrets）
      COV_USER: ${{ secrets.COVERITY_USER }}
      COV_PASS: ${{ secrets.COVERITY_PASS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Coverity pipeline
        shell: cmd
        run: |
          run_coverity.bat
